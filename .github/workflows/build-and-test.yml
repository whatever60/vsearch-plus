name: Build and test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ghostscript groff libbz2-dev openjdk-17-jdk zlib1g-dev

    - name: Build
      run: |
        ./scripts/build_cpp.sh

    - name: Smoke test public entrypoints
      run: |
        ./build/cpp/bin/vsearch --help >/dev/null
        ./scripts/rdp-classifier --help >/dev/null

    - name: Install tests
      run: |
        git clone https://github.com/frederic-mahe/vsearch-tests

    - name: Run tests
      run: |
        export PATH=$PWD/build/cpp/bin:$PATH
        cd vsearch-tests
        bash ./run_all_tests.sh
